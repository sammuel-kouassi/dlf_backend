services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: dlf_backend
      POSTGRES_PASSWORD: "z8Jf14yNeUgPQJcLnnVKGpX0yK3jaCkT"
    volumes:
      - dlf_backend_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "JSMpJrIamwVuFU8KkXR_l4SjEStEr23E"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: dlf_backend_test
      POSTGRES_PASSWORD: "5WkplxHkR8uGxwmGbiZY2oyEMJ2uW6jR"
    volumes:
      - dlf_backend_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "cDesIDIC0Deymvy5bwSYBicRxww-EJYO"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  dlf_backend_data:
  dlf_backend_test_data:
